<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <form>
      <div class="container">
        <!-- first text box -->
        <input type="text" id="firstnum" />
        <!-- second text box -->
        <input type="text" id="secondnum" />
        <!-- submit button -->
        <button id="addButton">Display the sum</button>

        <!-- place to display the result -->
        <div class="result">X + Y = ?</div>
      </div>
    </form>
    <script src="script.js"></script>
  </body>
</html>
